{% extends "base.html" %}
{% block content %}
<div class="page">
  <div style="margin-bottom:16px">
    <a href="{{ url_for('main.books') }}" style="color:#2563eb;font-size:13px;text-decoration:none">← Back</a>
  </div>
  <h1 class="page-title">Add New Book</h1>

  <div style="margin-top:16px">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" placeholder="Book title" required>
      </div>
      <div class="form-group">
        <label class="form-label">Author</label>
        <input type="text" name="author" class="form-control" placeholder="Author name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category_id" class="form-control" required>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Publication Year</label>
        <input type="number" name="publication_year" class="form-control" placeholder="e.g. 2023">
      </div>
      <div class="form-group">
        <label class="form-label">ISBN</label>
        <input type="text" name="isbn" class="form-control" placeholder="ISBN number">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input type="number" name="quantity" class="form-control" value="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4"
                  placeholder="Book description..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> Add Book
      </button>
    </form>
  </div>
</div>
{% endblock %}
