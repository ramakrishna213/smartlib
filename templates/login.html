{% extends "base.html" %}
{% block content %}

<style>
  .login-page {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; padding: 32px 24px;
    max-width: 480px; margin: 0 auto;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon {
    width: 44px; height: 44px; background: #2563eb; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
  }
  .logo-text { font-size: 22px; font-weight: 700; color: #111827; }
  .login-title { font-size: 26px; font-weight: 700; color: #111827; margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0; color: #9ca3af; font-size: 13px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: #e5e7eb;
  }
  .social-btns { display: flex; gap: 10px; margin-bottom: 20px; }
  .social-btn {
    flex: 1; padding: 11px; border-radius: 10px;
    border: 1.5px solid #e5e7eb; background: #fff;
    font-size: 13px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: #374151; text-decoration: none;
  }
  .social-btn:hover { background: #f9fafb; }
  .remember-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .remember-row label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #374151; cursor: pointer;
  }
  .forgot { font-size: 13px; color: #2563eb; text-decoration: none; font-weight: 500; }
  .signup-row { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
  .signup-row a { color: #2563eb; font-weight: 600; text-decoration: none; }
  .pw-wrap { position: relative; }
  .pw-wrap .form-control { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); background: none;
    border: none; color: #9ca3af; cursor: pointer; font-size: 16px;
  }
  .role-select { position: relative; }
  .role-select::after {
    content: '\f107'; font-family: 'Font Awesome 6 Free';
    font-weight: 900; position: absolute; right: 14px;
    top: 50%; transform: translateY(-50%);
    color: #9ca3af; pointer-events: none;
  }
</style>

<div class="login-page">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-book-open"></i></div>
    <span class="logo-text">SmartLib</span>
  </div>

  <h1 class="login-title">Welcome back</h1>
  <p class="login-sub">Please enter your details to sign in.</p>

  <form method="POST" action="{{ url_for('auth.login') }}">
    <!-- Role -->
    <div class="form-group">
      <label class="form-label">Role</label>
      <div class="role-select">
        <select class="form-control" name="role">
          <option value="member">Member</option>
          <option value="librarian">Librarian</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control"
             placeholder="Enter your email" required>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="pw"
               class="form-control" placeholder="••••••••" required>
        <button type="button" class="pw-toggle" onclick="togglePw()">
          <i class="fa-regular fa-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <!-- Remember + Forgot -->
    <div class="remember-row">
      <label>
        <input type="checkbox" name="remember"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-primary">
      Sign In
    </button>
  </form>

  <!-- Divider -->
  <div class="divider">Or continue with</div>

  <!-- Social buttons -->
  <div class="social-btns">
    <a href="#" class="social-btn">
      <img src="https://www.google.com/favicon.ico" width="16" height="16"> Google
    </a>
    <a href="#" class="social-btn">
      <i class="fa-brands fa-github"></i> GitHub
    </a>
  </div>

  <!-- Sign up -->
  <div class="signup-row">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a>
  </div>
</div>

<script>
  function togglePw() {
    const pw = document.getElementById('pw');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'fa-regular fa-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'fa-regular fa-eye';
    }
  }
</script>

{% endblock %}
