{% extends "base.html" %}
{% block content %}

<style>
  .login-page {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; padding: 32px 24px;
    max-width: 480px; margin: 0 auto;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon {
    width: 44px; height: 44px; background: #2563eb; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
  }
  .logo-text { font-size: 22px; font-weight: 700; color: #111827; }
  .login-title { font-size: 26px; font-weight: 700; color: #111827; margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
  .signin-row { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
  .signin-row a { color: #2563eb; font-weight: 600; text-decoration: none; }
  .pw-wrap { position: relative; }
  .pw-wrap .form-control { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); background: none;
    border: none; color: #9ca3af; cursor: pointer; font-size: 16px;
  }
  .name-row { display: flex; gap: 10px; }
  .name-row .form-group { flex: 1; }
</style>

<div class="login-page">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-book-open"></i></div>
    <span class="logo-text">SmartLib</span>
  </div>

  <h1 class="login-title">Create account</h1>
  <p class="login-sub">Join SmartLib to start borrowing books.</p>

  <form method="POST" action="{{ url_for('auth.register') }}">

    <!-- Name -->
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control"
             placeholder="Enter your full name" required>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control"
             placeholder="Enter your email" required>
    </div>

    <!-- Student ID + Department -->
    <div class="name-row">
      <div class="form-group">
        <label class="form-label">Student ID</label>
        <input type="text" name="student_id" class="form-control"
               placeholder="STU-2024-001">
      </div>
      <div class="form-group">
        <label class="form-label">Department</label>
        <select name="department" class="form-control">
          <option value="">Select</option>
          <option>Computer Science</option>
          <option>Engineering</option>
          <option>Business</option>
          <option>Arts</option>
          <option>Science</option>
        </select>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="pw"
               class="form-control" placeholder="Create a password" required>
        <button type="button" class="pw-toggle" onclick="togglePw()">
          <i class="fa-regular fa-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">
      Create Account <i class="fa-solid fa-check"></i>
    </button>
  </form>

  <div class="signin-row">
    Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
  </div>
</div>

<script>
  function togglePw() {
    const pw = document.getElementById('pw');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'fa-regular fa-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'fa-regular fa-eye';
    }
  }
</script>

{% endblock %}
